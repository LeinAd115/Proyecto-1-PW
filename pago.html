<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago | Hotel Quinta Dalam</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/formulario.css">
</head>
<body>

<header>
    <h1>Hotel Quinta Dalam</h1>
</header>

<section class="hero">
    <h2>Proceso de Pago</h2>
    <p>Ingrese los datos de su método de pago.</p>
</section>

<main>
    <section class="form-wrapper">
        <div class="form-card">
            <h2>Datos de Pago</h2>

            <form>

                <div class="form-group">
                    <label>Nombre del titular</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Número de tarjeta</label>
                    <input type="text" maxlength="16" required>
                </div>

                <div class="form-group">
                    <label>Fecha de vencimiento</label>
                    <input type="month" required>
                </div>

                <div class="form-group">
                    <label>CVV</label>
                    <input type="password" maxlength="4" required>
                </div>

                <div class="form-buttons">
                    <button type="submit">Confirmar Pago</button>
                </div>

            </form>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 Hotel Paraíso</p>
</footer>

</body>
</html>
