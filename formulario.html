<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Habitaciones - Hotel Paraíso</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/formulario.css">
</head>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
<body>

<header>
    <h1>Hotel Quinta Dalam</h1>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="mision.html">Misión</a>
        <a href="vision.html">Visión</a>
        <a href="catalogo.html">Habitaciones</a>
        <a href="contacto.html">Contacto</a>
        <a href="formulario.html" class="activo">Administrar</a>
    </nav>
</header>

<section class="hero">
    <h2>Administración de Habitaciones</h2>
    <p>Gestión interna de registros, modificaciones y eliminación de habitaciones.</p>
</section>

<main>
    <section class="form-wrapper">
        <div class="form-card">
            <h2>Formulario de Gestión</h2>

            <form action="#" method="post">

                <div class="form-group">
                    <label for="id">ID</label>
                    <input type="text" id="id" name="id" required>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre de la habitación</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" required></textarea>
                </div>

                <div class="form-group">
                    <label for="precio">Precio por noche</label>
                    <input type="number" id="precio" name="precio" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="tipo">Tipo</label>
                    <select id="tipo" name="tipo">
                        <option>Individual</option>
                        <option>Doble</option>
                        <option>Suite</option>
                    </select>
                </div>

                <div class="form-buttons">
                    <button type="submit">Alta</button>
                    <button type="submit">Modificar</button>
                    <button type="submit">Eliminar</button>
                </div>

            </form>
        </div>
    </section>
</main>
<footer>
    <p>© 2026 Hotel Paraíso</p>
</footer>

</body>
</html>
